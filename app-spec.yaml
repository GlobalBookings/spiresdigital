name: spiresdigital
region: lon1

static_sites:
  - name: site
    github:
      repo: GlobalBookings/spiresdigital
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    environment_slug: node-js
    envs:
      - key: PUBLIC_GA_MEASUREMENT_ID
        scope: BUILD_TIME
        value: G-B7840X8QFQ
    routes:
      - path: /

domains:
  - domain: spiresdigital.com
    type: PRIMARY
