      component:
        name: site

static_sites:
  - name: site
    github:
      repo: GlobalBookings/spiresdigital
      branch: main
      deploy_on_push: true
    # App Platform installs package-lock.json with npm ci before this command.
    # Keeping the build step separate makes deployments reproducible.
    build_command: npm run build
    output_dir: dist
    environment_slug: node-js
    envs:
      - key: PUBLIC_GA_MEASUREMENT_ID
        scope: BUILD_TIME
        value: G-B7840X8QFQ
domains:
  - domain: spiresdigital.com
    type: PRIMARY
    minimum_tls_version: "1.2"
  - domain: www.spiresdigital.com
    type: ALIAS
    minimum_tls_version: "1.2"
